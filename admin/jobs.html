<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Expires" content="0">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/admin-styles.css">
</head>
<body>
    <div class="admin-topbar">
        <div class="admin-topbar-left">
            <button class="mobile-sidebar-toggle" id="sidebarToggle">&#9776;</button>
            <h1>H&W <span>Admin</span></h1>
        </div>
        <div class="admin-topbar-right">
            <span class="admin-user" id="adminUser"></span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>

    <aside class="admin-sidebar" id="adminSidebar">
        <ul class="admin-nav">
            <li><a href="/admin/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a></li>
            <li><a href="/admin/jobs.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Jobs</a></li>
            <li><a href="/admin/clients.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Clients</a></li>
            <li><a href="/admin/invoices.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a></li>
            <li><a href="/admin/documents.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Documents</a></li>
            <li><a href="/admin/receipts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>Receipts</a></li>
            <li><a href="/admin/accounting.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Accounting</a></li>
            <li><a href="/admin/payment-methods.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payment Methods</a></li>
            <li><a href="/admin/reimbursements.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 7h16v13H2z"/><path d="M22 7l-4 4v5l4 4V7z"/><line x1="6" y1="12" x2="14" y2="12"/><line x1="10" y1="9" x2="10" y2="15"/></svg>Reimbursements</a></li>
            <li><a href="/admin/mileage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Mileage</a></li>
            <li><div class="nav-divider"></div></li>
            <li><a href="/" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>View Site</a></li>
        </ul>
    </aside>

    <main class="admin-main">
        <a href="/admin/" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Dashboard
        </a>

        <div class="admin-page-header">
            <h2>Jobs</h2>
            <button class="btn btn-primary" id="addJobBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Job
            </button>
        </div>

        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="in_progress">In Progress</button>
            <button class="filter-tab" data-filter="completed">Completed</button>
            <button class="filter-tab" data-filter="invoiced">Invoiced</button>
            <button class="filter-tab" data-filter="paid">Paid</button>
        </div>

        <div class="admin-card">
            <div class="admin-table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Job Name</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody">
                        <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Job Modal -->
    <div class="modal-overlay" id="addJobModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add Job</h3>
                <button class="modal-close" id="closeAddJob">&times;</button>
            </div>
            <form id="addJobForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="jobCustomer">Customer</label>
                        <select id="jobCustomer" class="form-control" required>
                            <option value="">Select a customer...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="jobName">Job Name *</label>
                        <input type="text" id="jobName" class="form-control" required placeholder="e.g. Panel Upgrade - 200A">
                    </div>
                    <div class="form-group">
                        <label for="jobDescription">Description</label>
                        <textarea id="jobDescription" class="form-control" rows="3" placeholder="Job details..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="jobStartDate">Start Date</label>
                        <input type="date" id="jobStartDate" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="cancelAddJob">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitAddJob">Create Job</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = window.supabase.createClient(
            'https://mxxabikquupnwvlspzyz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eGFiaWtxdXVwbnd2bHNwenl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2NDMwNTgsImV4cCI6MjA3NzIxOTA1OH0.WC_mupqYMneJnYmr9vmDZd0vXroBnaLwZlYX44J_HFQ'
        );

        // Helpers
        function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function formatDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
        function statusBadge(s) { return '<span class="badge badge-' + s + '">' + s.replace('_', ' ') + '</span>'; }
        function showToast(msg, type) {
            type = type || 'success';
            let c = document.querySelector('.toast-container');
            if (!c) { c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); }
            const t = document.createElement('div'); t.className = 'toast toast-' + type; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(100%)'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        let allJobs = [];
        let currentFilter = 'all';

        (async () => {
            // Auth guard
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = '/admin/login.html'; return; }

            document.getElementById('adminUser').textContent = session.user.email;
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await sb.auth.signOut();
                window.location.href = '/admin/login.html';
            });

            // Mobile sidebar
            const sidebar = document.getElementById('adminSidebar');
            const toggle = document.getElementById('sidebarToggle');
            toggle.addEventListener('click', () => sidebar.classList.toggle('open'));
            document.addEventListener('click', (e) => {
                if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target)) sidebar.classList.remove('open');
            });

            await loadJobs();
            setupFilters();
            setupModal();
        })();

        async function loadJobs() {
            const { data, error } = await sb
                .from('hw_jobs')
                .select('id, name, status, start_date, end_date, customer_id, hw_customers(name, is_gc, parent_gc_id, parent_gc:hw_customers!parent_gc_id(name))')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                allJobs = [];
            } else {
                allJobs = data || [];
            }
            renderJobs();
        }

        function renderJobs() {
            const tbody = document.getElementById('jobsTableBody');
            const filtered = currentFilter === 'all' ? allJobs : allJobs.filter(j => j.status === currentFilter);

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg><p>No jobs found</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(job => `
                <tr class="clickable" onclick="window.location.href='/admin/job-detail.html?id=${job.id}'">
                    <td><strong>${escapeHtml(job.name)}</strong></td>
                    <td>${escapeHtml(job.hw_customers?.parent_gc?.name ? '(' + job.hw_customers.parent_gc.name.split(' ').map(w => w[0]).join('').toUpperCase() + ') ' + job.hw_customers.name : (job.hw_customers?.name || '-'))}</td>
                    <td>${statusBadge(job.status)}</td>
                    <td>${formatDate(job.start_date)}</td>
                    <td>${formatDate(job.end_date)}</td>
                </tr>
            `).join('');
        }

        function setupFilters() {
            document.getElementById('filterTabs').addEventListener('click', (e) => {
                const tab = e.target.closest('.filter-tab');
                if (!tab) return;
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderJobs();
            });
        }

        function setupModal() {
            const modal = document.getElementById('addJobModal');
            const form = document.getElementById('addJobForm');

            document.getElementById('addJobBtn').addEventListener('click', async () => {
                modal.classList.add('active');
                // Load customers for dropdown
                const { data } = await sb.from('hw_customers').select('id, name').order('name');
                const select = document.getElementById('jobCustomer');
                select.innerHTML = '<option value="">Select a customer...</option>' +
                    (data || []).map(c => '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>').join('');
            });

            document.getElementById('closeAddJob').addEventListener('click', () => modal.classList.remove('active'));
            document.getElementById('cancelAddJob').addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submitAddJob');
                btn.disabled = true;
                btn.textContent = 'Creating...';

                const { error } = await sb.from('hw_jobs').insert([{
                    customer_id: document.getElementById('jobCustomer').value || null,
                    name: document.getElementById('jobName').value.trim(),
                    description: document.getElementById('jobDescription').value.trim() || null,
                    start_date: document.getElementById('jobStartDate').value || null,
                    status: 'pending'
                }]);

                if (error) {
                    showToast('Failed to create job: ' + error.message, 'error');
                } else {
                    showToast('Job created');
                    modal.classList.remove('active');
                    form.reset();
                    await loadJobs();
                }

                btn.disabled = false;
                btn.textContent = 'Create Job';
            });
        }
    </script>
</body>
</html>
